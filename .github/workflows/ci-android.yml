name: android

on:
  push:
    paths:
      - "android/**"
      - "schema/**"
  pull_request:
    paths:
      - "android/**"
      - "schema/**"

jobs:
  test:
    name: Android unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools-version: 35.0.0
          ndk-version: 26.3.11579264

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-android-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Run unit tests
        working-directory: android
        run: ./gradlew :core:testDebugUnitTest :app:testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phonebridge-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

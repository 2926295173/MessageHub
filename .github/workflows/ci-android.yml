name: Android

on:
  push:
    branches: [main, master]
  paths:
    - 'android/**'
    - 'schema/**'
    - '.github/workflows/ci-android.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/ci-android.yml'

env:
  ANDROID_HOME: /opt/android-sdk
  ANDROID_SDK_ROOT: /opt/android-sdk
  JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

jobs:
  lint:
    name: Kotlin / Gradle build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # M4 note: the Android module is scaffolded but not yet implemented
      # (lives in M5+). This job will be a no-op until M5 lands the actual
      # Kotlin sources. We keep it active to fail fast on schema drift.
      - name: Stub: check android module structure exists
        run: |
          test -d android && echo "android/ present" || (echo "android/ missing (M4 stub)" && exit 0)

name: Release

# Triggered only on a published GitHub Release. Builds the
# release artifacts (Linux message-center binary, Linux
# phonebridge-display binary, Android debug APK) and
# attaches them to the release on GitHub.
#
# Heavy work lives in this workflow instead of in
# ci-desktop.yml / ci-android.yml so we don't double-build
# the same tree on a release.
on:
  release:
    types: [published]

permissions:
  contents: write   # needed to upload release assets

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-binaries:
    name: Build Rust release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-release-pub-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-pub-

      - name: Build message-center (release)
        run: cargo build --release -p message-center

      - name: Build phonebridge-display (release)
        run: cargo build --release -p phonebridge-display

      - name: Stage binaries
        run: |
          mkdir -p dist
          cp target/release/message-center dist/
          cp target/release/phonebridge-display dist/
          chmod +x dist/*
          ls -la dist/

      - name: Upload artifacts (for the publish job)
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: dist/
          if-no-files-found: error

  android-apk:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: "35"
          build-tools-version: "35.0.0"
          ndk-version: "26.3.11579264"

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK (for the publish job)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  publish:
    name: Attach artifacts to release
    runs-on: ubuntu-latest
    needs: [rust-binaries, android-apk]
    steps:
      - uses: actions/checkout@v4

      - name: Download Rust binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: dist/

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/

      - name: List downloaded artifacts
        run: |
          echo "=== dist/ ==="
          ls -la dist/

      - name: Upload assets to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # ${{ github.event.release.tag_name }} is like "v0.1.0"; the
          # action's tag_name input accepts that directly. Empty
          # tag_name would be a programming error.
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/message-center
            dist/phonebridge-display
            dist/app-debug.apk
          # fail_on_unmatched_files: false so a partially-built
          # release (e.g. rust pass failed and was retried after
          # the apk was already attached) doesn't take down the
          # whole pipeline.
          fail_on_unmatched_files: false
          # Replace existing assets of the same name rather
          # than appending duplicates on re-runs.
          overwrite_files: true

name: Desktop

# Manual-trigger-only workflow. The release pipeline lives in
# ci-release.yml, which builds + uploads the release assets.
# This file is preserved for ad-hoc smoke runs: trigger
# it from the Actions tab when you want to validate a
# change without cutting a release.
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Rust build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Tool versions
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build (with embedded frontend)
        run: |
          cd frontend
          npm install -g bun@1
          bun install
          bun run build
          cd ..

      - name: Test
        run: cargo test --workspace

  smoke:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        run: npm install -g bun@1

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            target/
          key: ${{ runner.os }}-cargo-release-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-smoke-

      - name: Build
        run: |
          cd frontend && bun install && bun run build && cd ..

      - name: Run smoke
        run: bash scripts/e2e-smoke.sh
